[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--legacy-peer-deps"

# Next.js plugin
[[plugins]]
  package = "@netlify/plugin-nextjs"

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"

# CRITICAL: Configure these environment variables in Netlify Dashboard
# Go to: Site Settings > Environment Variables > Add Variable
# Add these EXACT variable names with your values from .env.local:
#
# Variable 1:
#   Key: NEXT_PUBLIC_SUPABASE_URL  
#   Value: [Copy from your .env.local file]
#
# Variable 2:
#   Key: NEXT_PUBLIC_SUPABASE_ANON_KEY
#   Value: [Copy from your .env.local file]  
#
# Variable 3:
#   Key: ANTHROPIC_API_KEY
#   Value: [Copy from your .env.local file]
#
# WITHOUT these variables, your site will show blank/errors!
# 
# Required variables:
# NEXT_PUBLIC_SUPABASE_URL = "your-supabase-project-url"
# NEXT_PUBLIC_SUPABASE_ANON_KEY = "your-supabase-anon-key"
# ANTHROPIC_API_KEY = "your-anthropic-api-key" (optional)

# Redirects for SPA routes
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false
  conditions = {Role = ["app"]}

# Headers for security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Build settings
[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--omit=dev"